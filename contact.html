<main id="main-content">
  <section>
    <h2>Form</h2>

  <form action="#" method="post" enctype="text/plain">

    <fieldset>
      <legend>Send a message</legend>

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone number (optional):</label>
        <input type="tel" id="phone" name="phone">
      </div>

      <div class="form-group">
        <label for="subject">Subject:</label>
        <input type="text" id="subject" name="subject">
      </div>

      <div class="form-group">
        <label for="message">Message:</label>
        <textarea id="message" name="message" required></textarea>
      </div>

    </fieldset>
    <fieldset>
      <legend>Message type</legend>

      <div class="radio-group">
        <input type="radio" id="hi" name="type" value="Just saying hi" required>
        <label for="hi">Just saying hi</label>
      </div>

      <div class="radio-group">
        <input type="radio" id="suggestions" name="type" value="Suggestions">
        <label for="suggestions">Suggestions</label>
      </div>

      <div class="radio-group">
        <input type="radio" id="idk" name="type" value="Opinion">
        <label for="idk">Opinion</label>
      </div>

    </fieldset>

    <button type="submit">Send</button>

  </form>
</section>
