<main id="main-content">
  <section>
  <h2>Contact Me</h2>

  <form action="#" method="post" enctype="text/plain">

    <fieldset>
      <legend>Send a message</legend>

      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="example@email.com" required>

      <label for="phone">Phone (optional):</label>
      <input type="tel" id="phone" name="phone">

      <label for="subject">Subject:</label>
      <input type="text" id="subject" name="subject">

      <label for="message">Message:</label>
      <textarea id="message" name="message" required></textarea>

    </fieldset>
    <fieldset>
      <legend>Message type</legend>

      <input type="radio" id="hi" name="type" value="Just saying hi" required>
      <label for="hi">Just saying hi</label>

      <input type="radio" id="suggestions" name="type" value="Suggestions">
      <label for="suggestions">Suggestions</label>

      <input type="radio" id="idk" name="type" value="Opinion">
      <label for="idk">Opinion</label>
    </fieldset>

    <button type="submit">Send</button>

  </form>
</section>
